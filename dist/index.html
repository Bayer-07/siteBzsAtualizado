<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BZS Tecnologia desenvolve sistemas em nuvem para gestão pública, cooperativas, transporte escolar, bibliotecas e controle operacional."
    />
    <meta name="theme-color" content="#2aa6df" />
    <script>
      (() => {
        const key = "bzs-theme";
        let theme = "light";

        try {
          const savedTheme = window.localStorage.getItem(key);

          if (savedTheme === "dark" || savedTheme === "light") {
            theme = savedTheme;
          } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch {
          theme = "light";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>BZS Tecnologia | Sistemas em nuvem para gestão inteligente</title>
